# product-spec.yml — What are we building and why?
# Generated by /discover pipeline. Founder-approved, agent-researched.
# ALL skills read this. It's the contract between intent and implementation.

# ── Who ──────────────────────────────────────────────
# Not "users." A specific person in a specific situation.
who:
  person: ""          # "A solo technical founder building a SaaS product"
  situation: ""       # "They're in month 3, have code but no users, and don't know if it's good"
  current_pain: ""    # "They spend hours guessing what to work on, ship features nobody wants"
  evidence: ""        # How do we know this person exists? (forum posts, interviews, demand signals)

# ── What changes ─────────────────────────────────────
# The before/after. What's different for this person after using the product?
change:
  before: ""          # "Guessing what matters, building in the dark, no feedback loop"
  after: ""           # "Every session improves the product measurably, predictions compound"
  in_one_sentence: "" # "Your product gets measurably better every session"

# ── Core loop ────────────────────────────────────────
# The thing the user does repeatedly. This is the product.
core_loop:
  trigger: ""         # What makes them start? "Open terminal, want to improve product"
  action: ""          # What do they do? "/plan → /go → /eval"
  reward: ""          # What do they get? "Score improved, predictions graded, model updated"
  frequency: ""       # How often? "Every coding session"

# ── First experience ─────────────────────────────────
# Minute 0 to first value. Every step is a chance to lose them.
first_experience:
  step_1: ""          # "Install: one command"
  step_2: ""          # "First score: see where their product stands"
  step_3: ""          # "First improvement: /go fixes something, score goes up"
  time_to_value: ""   # "Under 10 minutes"
  drop_off_risk: ""   # Where do they most likely quit?

# ── Return trigger ───────────────────────────────────
# Why do they come back tomorrow? No pull = no product.
return_trigger:
  mechanism: ""       # "Score from yesterday is the baseline. They want to beat it."
  data_lock_in: ""    # "predictions.tsv, experiment-learnings.md accumulate over time"
  habit_cue: ""       # "Session start shows what changed, what's stale, what's next"

# ── NOT building ─────────────────────────────────────
# The kill list. What you refuse to build. As important as what you build.
not_building:
  - "" # "Not a project management tool — no tickets, sprints, boards"
  - "" # "Not a code quality tool — SonarQube exists, we measure product quality"
  - "" # "Not a team tool — solo founders only until proven for one person"

# ── Competitors ──────────────────────────────────────
# Who else is in this space? How are we different?
competitors:
  - name: ""
    what_they_do: ""
    how_we_differ: ""
  - name: ""
    what_they_do: ""
    how_we_differ: ""

# ── Signals ──────────────────────────────────────────
# How do we know the product is working? Behaviors, not vanity metrics.
signals:
  - name: ""
    behavior: ""      # What the user DOES (not what they say)
    measurable: true
  - name: ""
    behavior: ""
    measurable: true

# ── Pricing ──────────────────────────────────────────
# Initial model. Will change. But having one forces clarity.
pricing:
  model: ""           # "free tier + paid at $X/mo" or "open source + hosted" or "usage-based"
  why_this_price: ""  # Grounded in competitor data + willingness-to-pay signals
  free_tier: ""       # What's free? What's behind the paywall?

# ── 2026 context ─────────────────────────────────────
# What's true RIGHT NOW that makes this the right thing to build?
why_now:
  market_shift: ""    # "AI agents are the platform. MCP is the standard. Solo founders can build what teams built."
  window: ""          # "6-12 months before incumbents ship agent layers on top of existing tools"
  technology: ""      # "Claude Code plugins just launched. 89K installs on top skill. Marketplace is open."

# ── Pivot triggers ───────────────────────────────────
# What evidence would make us change direction? Be specific.
pivot_triggers:
  - signal: ""        # "5 users say they want team features before solo is proven"
    response: ""      # "Investigate — might mean solo isn't the wedge"
  - signal: ""        # "Competitors ship measurement and it's good"
    response: ""      # "Differentiate on learning loop, not measurement"
  - signal: ""        # "Nobody comes back for session 2"
    response: ""      # "Core loop is broken. Fix return trigger before anything else."

# ── Metadata ─────────────────────────────────────────
generated_by: /discover
generated_at: ""
last_reviewed: ""
review_trigger: "Review when: thesis changes, evidence disproves a claim, pivot trigger fires"
