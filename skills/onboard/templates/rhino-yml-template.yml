# rhino.yml — generated by /onboard
# This is the source of truth for your product's identity and features.
# /onboard fills this from code analysis. Edit it as your product evolves.

project:
  name: ""           # project name from package.json/Cargo.toml/etc.
  stage: mvp         # mvp | early | growth | mature
  mode: build        # build | ship | explore
  type: ""           # web | cli | library | api | mobile | desktop

value:
  hypothesis: ""     # one testable sentence: "[user] can [action] without [pain point]"
  user: ""           # a specific person, not "users" — "a solo founder debugging at 2am"
  signals: []        # what would prove the hypothesis? ["user completes onboard in <2min"]

features:
  # Detected from codebase. Each feature delivers user value.
  # Modules, utilities, and infrastructure are NOT features.
  #
  # feature_name:
  #   delivers: "what the user gets"        — read from code, not guessed
  #   for: "specific person"                — who benefits
  #   code: ["src/auth/", "app/login/"]     — file paths that implement it
  #   weight: 3                             — importance to value hypothesis (1-5)
  #   status: active                        — active | planned | killed
  #   depends_on: []                        — other feature names this requires
