# AI Eval — runs on PRs via Claude Code (your auth, no API key)
#
# Setup:
#   1. Copy to .github/workflows/ai-eval.yml
#   2. Run `claude setup-token` locally, copy the token
#   3. Add CLAUDE_CODE_OAUTH_TOKEN to repo secrets
#   4. Use builder plan mode to generate .claude/evals/[feature].yml
#
# What it does:
#   - Runs deterministic checks (tsc, test, build)
#   - Runs eval spec assertions via claude -p (ceiling tests, perspectives)
#   - Posts results as a PR comment with tiered scoring

name: AI Eval

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      # --- Tier 1: Deterministic ---
      - name: TypeScript check
        id: tsc
        run: |
          if npx tsc --noEmit 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Tests
        id: test
        run: |
          if npm test 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Build
        id: build
        run: |
          if npm run build 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # --- Tier 2+3: Functional + Ceiling via Claude Code ---
      # Custom deterministic checks from eval spec are handled by Claude
      # in the eval step below (no shell eval of YAML content)
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval spec via Claude
        id: claude_eval
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          EVAL_FILE=$(ls .claude/evals/*.yml 2>/dev/null | head -1)
          PLAN_FILE=".claude/plans/active-plan.md"
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD --stat)
          DIFF_FULL=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.css' | head -5000)

          if [[ -z "$EVAL_FILE" ]]; then
            echo "status=no_spec" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EVAL_CONTENT=$(cat "$EVAL_FILE")
          PLAN_CONTENT=""
          [[ -f "$PLAN_FILE" ]] && PLAN_CONTENT=$(cat "$PLAN_FILE")

          PROMPT="You are a strict code evaluator. Evaluate this PR against the eval spec.

          ## Eval Spec
          $EVAL_CONTENT

          ## Plan
          $PLAN_CONTENT

          ## Changes (stat)
          $DIFF

          ## Code Changes
          $DIFF_FULL

          Run through every assertion in the 'functional' section — read the relevant files to verify each one.
          Then run every test in the 'ceiling' section — be genuinely strict. A 0.7 is a good ceiling score. Don't inflate.
          Then evaluate each perspective.

          Output ONLY valid JSON, no markdown fences:
          {
            \"functional\": [{\"name\": \"...\", \"result\": \"PASS|FAIL|CANT_VERIFY\", \"reason\": \"...\"}],
            \"ceiling\": [{\"name\": \"...\", \"score\": 0.0-1.0, \"assessment\": \"...\"}],
            \"perspectives\": [{\"persona\": \"...\", \"score\": 0.0-1.0, \"reason\": \"...\"}],
            \"ceiling_avg\": 0.0-1.0,
            \"perspectives_avg\": 0.0-1.0,
            \"verdict\": \"SHIP|SHIP_WITH_FIXES|BLOCKED\",
            \"top_fixes\": [\"...\"],
            \"ceiling_gaps\": [\"where AI judgment fell short\"]
          }"

          RESULT=$(claude -p "$PROMPT" --output-format json --max-turns 10 --allowedTools Read,Grep,Glob,Bash 2>/dev/null)

          # Extract the text result
          EVAL_JSON=$(echo "$RESULT" | jq -r '.result // .text // empty' 2>/dev/null)
          if [[ -z "$EVAL_JSON" ]]; then
            EVAL_JSON=$(echo "$RESULT" | jq -r '.messages[-1].content // empty' 2>/dev/null)
          fi

          if [[ -n "$EVAL_JSON" ]]; then
            echo "$EVAL_JSON" > /tmp/eval-result.json
            echo "status=complete" >> "$GITHUB_OUTPUT"
            VERDICT=$(echo "$EVAL_JSON" | jq -r '.verdict // "UNKNOWN"' 2>/dev/null)
            echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # --- Post PR Comment ---
      - name: Post eval results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const tsc = '${{ steps.tsc.outputs.result }}' || 'SKIP';
            const test = '${{ steps.test.outputs.result }}' || 'SKIP';
            const build = '${{ steps.build.outputs.result }}' || 'SKIP';
            const evalStatus = '${{ steps.claude_eval.outputs.status }}';
            const verdict = '${{ steps.claude_eval.outputs.verdict }}' || 'N/A';

            const icon = (s) => s === 'PASS' ? '✅' : s === 'FAIL' ? '❌' : '⏭️';
            const vIcon = verdict === 'SHIP' ? '🟢' : verdict === 'SHIP_WITH_FIXES' ? '🟡' : verdict === 'BLOCKED' ? '🔴' : '⚪';
            const bar = (score) => {
              const filled = Math.round(score * 10);
              return '█'.repeat(filled) + '░'.repeat(10 - filled) + ` ${score.toFixed(1)}`;
            };

            let body = `## ${vIcon} AI Eval: ${verdict}\n\n`;

            // Tier 1
            body += `### Tier 1: Deterministic\n`;
            body += `| Check | Result |\n|-------|--------|\n`;
            body += `| TypeScript | ${icon(tsc)} ${tsc} |\n`;
            body += `| Tests | ${icon(test)} ${test} |\n`;
            body += `| Build | ${icon(build)} ${build} |\n\n`;

            // Tier 2+3 from Claude eval
            if (evalStatus === 'complete') {
              try {
                const r = JSON.parse(fs.readFileSync('/tmp/eval-result.json', 'utf8'));

                if (r.functional?.length) {
                  body += `### Tier 2: Functional\n`;
                  body += `| Assertion | Result | Notes |\n|-----------|--------|-------|\n`;
                  for (const a of r.functional) {
                    const i = a.result === 'PASS' ? '✅' : a.result === 'FAIL' ? '❌' : '❓';
                    body += `| ${a.name} | ${i} ${a.result} | ${a.reason} |\n`;
                  }
                  body += '\n';
                }

                if (r.ceiling?.length) {
                  body += `### Tier 3: Ceiling Tests\n`;
                  body += `| Test | Score | Assessment |\n|------|-------|------------|\n`;
                  for (const c of r.ceiling) {
                    body += `| ${c.name} | ${bar(c.score)} | ${c.assessment} |\n`;
                  }
                  if (r.ceiling_avg != null) {
                    body += `\n**Ceiling average: ${r.ceiling_avg.toFixed(2)}/1.0** (threshold: 0.6)\n\n`;
                  }
                }

                if (r.perspectives?.length) {
                  body += `### Perspectives\n`;
                  body += `| Persona | Score | Reason |\n|---------|-------|--------|\n`;
                  for (const p of r.perspectives) {
                    body += `| ${p.persona} | ${bar(p.score)} | ${p.reason} |\n`;
                  }
                  if (r.perspectives_avg != null) {
                    body += `\n**Perspectives average: ${r.perspectives_avg.toFixed(2)}/1.0** (threshold: 0.6)\n\n`;
                  }
                }

                if (r.ceiling_gaps?.length) {
                  body += `### Ceiling Gaps (where AI judgment fell short)\n`;
                  for (const gap of r.ceiling_gaps) {
                    body += `- ⚠️ ${gap}\n`;
                  }
                  body += '\n';
                }

                if (r.top_fixes?.length) {
                  body += `### Top Fixes\n`;
                  for (const fix of r.top_fixes) {
                    body += `- ${fix}\n`;
                  }
                  body += '\n';
                }
              } catch (e) {
                body += `\n_Eval results could not be parsed._\n`;
              }
            } else if (evalStatus === 'no_spec') {
              body += `> No eval spec found. Add \`.claude/evals/[feature].yml\` to enable Tier 2+3 evaluation.\n`;
              body += `> Use builder plan mode to generate one before your next PR.\n\n`;
            } else {
              body += `> Claude eval did not complete. Check workflow logs.\n\n`;
            }

            body += `---\n_[rhino-os](https://github.com/laneyfraass/rhino-os) AI Eval · Tier 1 (deterministic) + Tier 2 (functional) + Tier 3 (ceiling)_`;

            // Upsert comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('rhino-os') && c.body?.includes('AI Eval'));

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
