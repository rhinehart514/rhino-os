# rhino.yml — All tunable parameters in one place.
# Meta reads this, tunes it, tracks what changed.
# Every component reads from here. No more magic numbers.

# ── Agents ──────────────────────────────────────────
agents:
  budgets:
    sweep: 2.00
    scout: 2.00
    builder: ~          # unlimited (interactive)
    strategist: 2.00
    design: 2.00
    meta: 3.00

  schedules:            # LaunchAgent cron (for reference — plists are source of truth)
    sweep: "daily 8:00"
    scout: "weekly monday 6:00"
    meta: "monthly 1st 7:00"

# ── Scoring (score.sh) ─────────────────────────────
scoring:
  cache_ttl: 300          # seconds before score cache expires

  build:
    ts_error_penalty: -30
    stale_build_penalty: -10    # build older than 1 day
    build_fail_penalty: -50
    gate_threshold: 70          # score >= this to pass

  structure:
    dead_end_weight: 0.5        # multiply dead-end % by this
    empty_state_weight: 0.33    # multiply missing-CTA % by this

  hygiene:
    # Hardcoded tiered penalties in score.sh (edit score.sh to change):
    # any_types:     >50: -30, >20: -20, >5: -10
    # console_logs:  >30: -25, >15: -15, >5: -5
    # todos:         >30: -20, >15: -10, >5: -5
    # large_imports: >10: -15, >5: -10
    # lint_overrides: >20: -15, >10: -10, >3: -5

# ── Taste (taste.mjs) ──────────────────────────────
taste:
  max_routes: 8               # routes to screenshot
  max_screenshots: 24         # total screenshots (routes + mobile + scroll depths)
  cache_ttl: 7200             # seconds (2 hours)
  stale_warning_days: 7       # flag in score output after this

  viewports:
    desktop: { width: 1440, height: 900 }
    mobile: { width: 390, height: 844 }

  timeouts:
    page_load: 30000          # ms — playwright goto timeout
    post_load_wait: 1000      # ms — wait after page load
    eval_timeout: 180000      # ms — claude vision timeout
    port_check: 5000          # ms — dev server check
    server_startup: 3000      # ms — per-attempt fetch timeout for dev server readiness

  context:
    taste_lines: 20           # lines from taste.jsonl
    product_lines: 80         # lines from CLAUDE.md
    priority_keywords:        # routes matching these get priority
      - create
      - new
      - enter
      - login
      - sign
      - onboard
      - home
      - dashboard
      - profile
      - settings

  dimensions:                 # the 9 taste dimensions (rubric)
    - hierarchy
    - breathing_room
    - contrast
    - polish
    - emotional_tone
    - information_density
    - wayfinding
    - distinctiveness
    - scroll_experience

# ── Knowledge & Decay ──────────────────────────────
knowledge:
  position_decay_days: 60      # downgrade confidence after this
  knowledge_stale_days: 90     # mark entries stale after this
  log_retention_days: 30       # archive logs after this
  grade_archive_months: 6      # archive grades.jsonl after this
  max_knowledge_lines: 200     # prune scout/knowledge.md beyond this
  max_search_strategy_lines: 80

# ── Context Window ─────────────────────────────────
context:
  taste_lines: 10              # lines agents read from taste.jsonl
  meta_grade_lines: 3          # lines agents read from grades.jsonl
  recent_commits: 5            # git log depth for sweep
  recent_prs: 10               # PR list depth for sweep

# ── Agent Brains ──────────────────────────────────
brains:
  # Simplified: agents store next_move, no credibility/stances
  # Each agent writes ~/.claude/state/brains/{agent}.json
  # Contains: next_move, bias_awareness, last_run, updated

# ── Score Integrity ───────────────────────────────
# Scores exist to reflect reality, not to be maximized.
# If a score exceeds the ceiling for its stage, flag it as suspicious.
# "Get to 100" is not a valid goal. "Improve the weakest dimension" is.
integrity:
  # Expected ranges per project stage. Exceeding ceiling = suspicious.
  stage_ceilings:
    mvp:
      score: [30, 65]
      taste: [1.5, 3.0]
    early:
      score: [45, 80]
      taste: [2.0, 3.5]
    growth:
      score: [60, 90]
      taste: [3.0, 4.0]
    mature:
      score: [70, 95]
      taste: [3.5, 4.5]

  cosmetic_only_warning: true
  max_single_commit_delta: 15
  plateau_experiments: 5

# ── Experiment Discipline ──────────────────────────
experiments:
  keep_rate_target: 0.40       # meta flags below this
  max_files_per_experiment: 3  # scope discipline
  feature_set_size: [3, 7]     # min, max coordinated changes
  sprint_tasks: [3, 7]         # min, max tasks per sprint
  alpha_rate_target: 0.50      # % of scout positions that should be non-obvious
