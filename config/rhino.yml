# rhino.yml — Tunable parameters for rhino-os.
# Keep this minimal. Most behavior lives in mind/ and .claude/commands/.

# ── Project ─────────────────────────────────────────
project:
  stage: early  # mvp → early → growth → mature. Controls score ceiling warnings.

# ── Value Definition ───────────────────────────────
# The founder defines what value means. Everything else serves this.
# /assert reads this to generate assertions. /plan reads this to prioritize.
# /go reads this to know when a task actually matters.
value:
  # One sentence: what does the user get?
  hypothesis: "A solo founder's product gets measurably better every session with less effort than doing it manually"
  # Who specifically?
  user: "Solo technical founders building products with Claude Code"
  # How do we know it's working? (measurable proxies)
  signals:
    - name: time_to_first_value
      description: "Score improves after first /go session"
      target: "Score delta > 0 within 1 session"
      measurable: true
    - name: loop_compounds
      description: "Prediction accuracy improves over 5+ sessions"
      target: "Accuracy trend is upward"
      measurable: true
    - name: assertions_graduate
      description: "Failing assertions become passing over time"
      target: ">50% of planted assertions pass within 3 sessions"
      measurable: true
    - name: return_trigger
      description: "Founder starts next session with /plan, not from scratch"
      target: "Active plan exists at session start"
      measurable: true
    - name: would_notice_removal
      description: "Founder would miss rhino-os if it disappeared"
      target: "Qualitative — ask"
      measurable: false

# ── Scoring (score.sh) — Health tier ───────────────
scoring:
  cache_ttl: 300
  build:
    ts_error_penalty: -30
    stale_build_penalty: -10
    build_fail_penalty: -50
    gate_threshold: 70
  structure:
    dead_end_weight: 0.5
    empty_state_weight: 0.33
  # Hygiene penalties are hardcoded tiers in score.sh

# ── Taste (taste.mjs) ──────────────────────────────
taste:
  max_routes: 8
  max_screenshots: 24
  cache_ttl: 7200
  stale_warning_days: 7
  viewports:
    desktop: { width: 1440, height: 900 }
    mobile: { width: 390, height: 844 }
  timeouts:
    page_load: 30000
    post_load_wait: 1000
    eval_timeout: 180000
    port_check: 5000
    server_startup: 3000
  dimensions:
    - hierarchy
    - breathing_room
    - contrast
    - polish
    - emotional_tone
    - information_density
    - wayfinding
    - distinctiveness
    - scroll_experience
    - layout_coherence
    - information_architecture

# ── Score Integrity ──────────────────────────────────
integrity:
  stage_ceilings:
    mvp: { score: [30, 65], taste: [1.5, 3.0] }
    early: { score: [45, 80], taste: [2.0, 3.5] }
    growth: { score: [60, 90], taste: [3.0, 4.0] }
    mature: { score: [70, 95], taste: [3.5, 4.5] }
  cosmetic_only_warning: true
  max_single_commit_delta: 15
  plateau_experiments: 5

# ── Experiments ──────────────────────────────────────
experiments:
  keep_rate_target: 0.40
  discard_rate_floor: 0.25
  moonshot_every_n: 5
  max_files_per_experiment: 5
  sprint_tasks: [3, 7]

# ── Go (autonomous loop) ────────────────────────────
go:
  plateau_threshold: 3
  taste_every_n: 3
  worktrees_enabled: false

# ── Evals ────────────────────────────────────────────
evals:
  tier1_on_every_build: true
  tier2_on_demand: true          # behavioral eval — requires dev server
  block_on_failure: true         # hard fail on "block" severity beliefs
  warn_threshold: 3              # N consecutive warns before escalating

# ── Corpus ───────────────────────────────────────────
corpus:
  staleness_days: 90             # evict examples older than this
  min_consensus_score: 8.0       # minimum average score across models
  max_score_variance: 0.5        # maximum variance between models
  update_every_n_iterations: 5   # update corpus every N /go iterations (--corpus flag)
  categories:
    - ui/saas
    - ui/consumer
    - ui/developer
    - copy/landing
    - copy/onboarding
    - code/patterns

# ── Agent (self-improvement) ─────────────────────────
# Parameters the agent can tune via /evolve experiments.
# Principles (identity, predict→act→measure, value>craft>health) are FIXED.
# Procedures (these numbers) are VARIABLE.
agent:
  # Tunable thresholds (agent can change autonomously)
  tunable:
    prediction_accuracy_target: [0.50, 0.70]   # calibration sweet spot
    moonshot_frequency: 5                        # every Nth experiment is high-risk
    experiment_time_cap_minutes: 15              # max minutes per experiment
    plateau_threshold: 3                         # consecutive no-improvement before pivot
    taste_frequency: 3                           # run taste every Nth experiment
    unknown_exploration_ratio: 0.20              # fraction of experiments in unknown territory

  # Founder-gated (requires confirmation to change)
  gated:
    - mind/*.md                                  # principles
    - .claude/commands/*.md                      # command procedures
    - bin/score.sh                               # eval harness
    - bin/taste.mjs                              # eval harness
    - bin/eval.sh                                # eval harness

  # Experiment discipline
  experiments:
    max_concurrent: 1                            # one param at a time
    min_sessions_before_revert: 3                # run new value for 3 sessions before judging
    log_file: agent-experiments.tsv              # created at runtime in project root

# ── Self ─────────────────────────────────────────────
self:
  prediction_accuracy_floor: 0.30
  prediction_accuracy_ceiling: 0.90
  prediction_stale_days: 7
  knowledge_stale_days: 14
  self_stale_days: 7
  min_predictions_per_week: 3
  hook_timeout_ms: 200

# ── Memory ───────────────────────────────────────────
memory:
  session_summary_on_compact: true   # write summary to brains/daily.md on compact
  longterm_review_every_n_days: 7    # remind to review/update longterm.md
