# beliefs.yml — Your product's soul, enforced mechanically
#
# Each belief is a hypothesis about what makes your product great.
# Beliefs are tested by eval.sh. Only types eval.sh supports are valid:
#   - content_check with forbidden: [...] — scans src/ for forbidden words
#   - route_graph — counts Next.js routes
#   - file_check — verifies file existence and content patterns
#   - dom_check — requires dev server (skipped in CLI eval, run via taste)
#   - playwright_task — requires dev server + Playwright (skipped in CLI eval)
#
# Severity: block (exits non-zero) | warn (flags but continues)
#
# Lifecycle:
#   Planted → Failing → Passing → Locked (3+ sessions validated)

beliefs:

  # --- Value tier (does the product deliver?) ---

  - id: value-hypothesis-exists
    belief: "The product must define what value it delivers — no hypothesis, no direction"
    type: file_check
    check: "config/rhino.yml contains 'value:' section"
    severity: block

  - id: knowledge-model-exists
    belief: "The learning model must exist — without it the system can't compound"
    type: file_check
    check: "~/.claude/knowledge/experiment-learnings.md exists and has content"
    severity: block

  # --- Craft tier (is the experience well-made?) ---

  - id: no-jargon
    belief: "No user needs a glossary to use rhino-os"
    type: content_check
    forbidden: ["utilize", "leverage", "synergy", "paradigm", "ecosystem", "holistic"]
    severity: warn

  # --- Health tier (is the code clean?) ---

  - id: no-dead-skills
    belief: "Every skill file must handle failure — unrecoverable skills break the loop"
    type: file_check
    check: "all .claude/commands/*.md contain 'If something breaks'"
    severity: warn

  - id: hooks-resolve
    belief: "All hook symlinks must point to real files"
    type: file_check
    check: "all symlinks in ~/.claude/hooks/ resolve"
    severity: warn

  - id: mind-files-loaded
    belief: "Mind files must be globally accessible — they're the system's values"
    type: file_check
    check: "~/.claude/rules/ has symlinks to mind/identity.md, mind/thinking.md, mind/standards.md"
    severity: block

  # --- DOM tier (mechanical UX assertions) ---

  - id: contrast
    belief: "No text fails WCAG AA contrast (4.5:1) — invisible text is invisible value"
    type: dom_check
    metric: contrast
    severity: warn

  - id: click-targets
    belief: "All interactive elements >= 44px — undersized targets lose mobile users"
    type: dom_check
    metric: targets
    severity: warn

  - id: hierarchy
    belief: "h1 font-size > h2 > body — visual hierarchy tells users what matters"
    type: dom_check
    metric: hierarchy
    severity: warn

  - id: distinctiveness-floor
    belief: "Font-family != Inter OR non-white background OR custom palette — not AI-generic"
    type: dom_check
    metric: distinctiveness
    severity: warn

  # --- Copy tier (messaging quality) ---

  - id: copy-clarity
    belief: "Hero headline <= 12 words, grade level <= 8, no jargon — clear beats clever"
    type: copy_check
    metric: copy-clarity
    severity: warn

  - id: value-prop-specific
    belief: "Headline names a user and contains a verb — not abstract positioning"
    type: copy_check
    metric: value-prop-specific
    severity: warn

  # --- Positioning tier (market differentiation) ---

  - id: positioned-not-generic
    belief: "Hero makes a specific claim for a named user — not abstract AI marketing"
    type: positioning_check
    metric: positioned-not-generic
    severity: warn

  # --- Self tier (learning intelligence) ---

  - id: learning-compounds
    belief: "Prediction calibration must be 30-90% — broken or too-safe model stops the loop"
    type: self_check
    metric: calibration
    severity: warn

  # --- Behavioral tier (the val_bpb) ---

  - id: first-action-works
    belief: "A blind user can complete the primary action in < 3 minutes"
    type: playwright_task
    metric: first-action-works
    scenario: "Find and complete the primary action on this product"
    threshold_seconds: 180
    severity: warn

  - id: value-visible
    belief: "After completing primary action, user can see something changed"
    type: playwright_task
    metric: value-visible
    scenario: "Find and complete the primary action on this product"
    threshold_seconds: 180
    severity: warn

