# beliefs.yml — What must be true about rhino-os
#
# Features: scoring, learning, self-diagnostic, commands, install, docs
# Quality: correctness (works?), craft (well-made?), completeness (everything built?)
# Layer: infrastructure (plumbing), logic (behavior), ux (experience)
#
# Types:
#   file_check    — file exists, contains string, min lines (mechanical)
#   content_check — forbidden words in source dirs (mechanical)
#   self_check    — runs self.sh --eval metric (mechanical)
#   bench_check   — runs rhino bench, checks calibration % (mechanical)
#   score_trend   — reads history.tsv, checks score variance/direction (mechanical)
#   assertion_trend — are assertions graduating (fail→pass) over sessions? (mechanical)
#   session_continuity — is the system being used regularly? (mechanical)
#   value_velocity — how fast does score improve from baseline? (mechanical)
#   command_check — run arbitrary shell command (mechanical)
#   feature_review — Claude evaluates feature completeness (capabilities list or inferred)
#   llm_judge     — Claude evaluates code quality (subjective, uses Haiku)
#
# feature: which part of the product this tests
# quality: dimension (correctness | craft | completeness)
# layer: infrastructure | logic | ux
# severity: block (score = 0 if failing) | warn (flags but continues)

beliefs:

  # ════════════════════════════════════════════════════════
  # SCORING — does the score work and mean something?
  # ════════════════════════════════════════════════════════

  # ── scoring / correctness ──

  - id: score-runs
    belief: "rhino score . produces a number"
    type: self_check
    metric: score-runs
    feature: scoring
    quality: correctness
    layer: infrastructure
    severity: block

  - id: value-hypothesis-exists
    belief: "rhino.yml defines what value the product delivers"
    type: file_check
    path: "config/rhino.yml"
    contains: "hypothesis:"
    feature: scoring
    quality: correctness
    layer: infrastructure
    severity: block

  - id: value-hypothesis-defined
    belief: "rhino.yml has value: section"
    type: self_check
    metric: value-hypothesis-defined
    feature: scoring
    quality: correctness
    layer: infrastructure
    severity: block

  - id: score-calibrated
    belief: "rhino score gives honest numbers — low for bad repos, high for good ones"
    type: bench_check
    min_calibration: 80
    feature: scoring
    quality: correctness
    layer: logic
    severity: warn

  - id: score-has-history
    belief: "history.tsv has >2 entries — scoring is actually being used"
    type: command_check
    command: test $(wc -l < .claude/scores/history.tsv 2>/dev/null || echo 0) -gt 2
    feature: scoring
    quality: correctness
    layer: infrastructure
    severity: warn

  # ── scoring / craft ──

  - id: scoring-formula-clear
    belief: "score.sh formula is understandable — a new contributor can read it"
    type: file_check
    path: "bin/score.sh"
    contains: "SCORING FORMULA"
    feature: scoring
    quality: craft
    layer: ux
    severity: warn

  - id: beliefs-are-meaningful
    belief: "The assertions in beliefs.yml test things that matter, not trivial checks"
    type: command_check
    command: test $(grep '    type:' lens/product/eval/beliefs.yml | sort -u | wc -l) -gt 3
    feature: scoring
    quality: craft
    layer: logic
    severity: warn

  # ── scoring / completeness ──

  - id: scoring-complete
    belief: "Scoring covers the full value measurement stack"
    type: feature_review
    feature: scoring
    quality: completeness
    layer: logic
    capabilities:
      - "score.sh produces a numeric score for any project type"
      - "health gate blocks score when infrastructure is broken"
      - "assertions drive the score when beliefs.yml exists"
      - "history.tsv tracks scores over time"
      - "bench.sh validates scoring accuracy against test fixtures"
      - "score handles edge cases: empty project, no assertions, missing files"
    severity: warn

  - id: score-not-stagnant
    belief: "Score has changed in the last 10 runs — the tool is actually doing something"
    type: score_trend
    window: 10
    direction: not_flat
    feature: scoring
    quality: completeness
    layer: logic
    severity: warn

  - id: score-improving
    belief: "Score has improved from baseline — the system delivers value over time"
    type: value_velocity
    feature: scoring
    quality: completeness
    layer: logic
    severity: warn

  # ════════════════════════════════════════════════════════
  # LEARNING — does the system get smarter over time?
  # ════════════════════════════════════════════════════════

  # ── learning / correctness ──

  - id: knowledge-model-exists
    belief: "experiment-learnings.md exists — the system can't compound without it"
    type: file_check
    path: "~/.claude/knowledge/experiment-learnings.md"
    min_lines: 5
    feature: learning
    quality: correctness
    layer: infrastructure
    severity: block

  - id: predictions-logged
    belief: "predictions.tsv has entries — the learning loop is running"
    type: self_check
    metric: predictions-logged
    feature: learning
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: learning-compounds
    belief: "Prediction accuracy is 30-90% — calibrated, not broken or too safe"
    type: self_check
    metric: calibration
    feature: learning
    quality: correctness
    layer: logic
    severity: warn

  - id: predictions-graded-recently
    belief: "Predictions from the last 7 days have been graded — the loop closes"
    type: command_check
    command: awk -F'\t' -v cutoff=$(date -v-7d +%Y-%m-%d) '$1 >= cutoff && $5 != "" { found=1 } END { exit !found }' ~/.claude/knowledge/predictions.tsv
    feature: learning
    quality: correctness
    layer: logic
    severity: warn

  - id: knowledge-updated-recently
    belief: "experiment-learnings.md updated within 14 days — model is not stale"
    type: command_check
    command: test $(( ($(date +%s) - $(stat -f %m ~/.claude/knowledge/experiment-learnings.md 2>/dev/null || echo 0)) / 86400 )) -le 14
    feature: learning
    quality: correctness
    layer: logic
    severity: warn

  # ── learning / craft ──

  - id: plan-fresh
    belief: "plan.yml updated within 7 days — sessions are happening"
    type: command_check
    command: test $(( ($(date +%s) - $(stat -f %m .claude/plans/plan.yml 2>/dev/null || echo 0)) / 86400 )) -le 7
    feature: learning
    quality: craft
    layer: infrastructure
    severity: warn

  - id: sessions-happening
    belief: "The system is being used regularly — sessions happening within 14 days"
    type: session_continuity
    max_gap_days: 14
    feature: learning
    quality: craft
    layer: infrastructure
    severity: warn

  # ── learning / completeness ──

  - id: learning-complete
    belief: "Learning covers the full predict-measure-update loop"
    type: feature_review
    feature: learning
    quality: completeness
    layer: logic
    capabilities:
      - "predictions.tsv gets new entries logged with evidence"
      - "grade.sh auto-grades predictions against score history"
      - "experiment-learnings.md gets updated when predictions are wrong"
      - "session boot card surfaces prediction accuracy and staleness"
      - "rhino trail renders the arc of improvement across sessions"
    severity: warn

  - id: assertions-graduating
    belief: "Assertions are graduating (fail→pass) over sessions — the product is improving"
    type: assertion_trend
    window: 5
    direction: graduating
    feature: learning
    quality: completeness
    layer: logic
    severity: warn

  # ════════════════════════════════════════════════════════
  # SELF-DIAGNOSTIC — do the tools work?
  # ════════════════════════════════════════════════════════

  # ── self-diagnostic / correctness ──

  - id: eval-runs
    belief: "rhino eval . exits without crash"
    type: self_check
    metric: eval-runs
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: block

  - id: tests-pass
    belief: "rhino test exits 0"
    type: self_check
    metric: tests-pass
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: block

  - id: help-works
    belief: "rhino help produces output"
    type: self_check
    metric: help-works
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  # ── self-diagnostic / craft ──

  - id: feature-system-coherent
    belief: "The feature system (detect, list, view) forms a coherent workflow"
    type: command_check
    command: grep -q 'list' bin/feature.sh && grep -q 'detect' bin/feature.sh
    feature: self-diagnostic
    quality: craft
    layer: ux
    severity: warn

  # ── self-diagnostic / completeness ──

  - id: self-diagnostic-complete
    belief: "Self-diagnostic tools measure system health and calibration"
    type: feature_review
    feature: self-diagnostic
    quality: completeness
    layer: logic
    capabilities:
      - "self.sh checks all 4 systems: measure, think, act, learn"
      - "bench.sh validates scoring against test fixture repos"
      - "feature.sh lists, views, and detects features"
      - "score.sh --json provides machine-readable output"
      - "rhino status provides system health overview"
    severity: warn

  # ════════════════════════════════════════════════════════
  # COMMANDS — do the slash commands make sense?
  # ════════════════════════════════════════════════════════

  # ── commands / correctness ──

  - id: commands-have-descriptions
    belief: "Every command has a description in its frontmatter"
    type: self_check
    metric: commands-have-descriptions
    feature: commands
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: plan-has-recovery
    belief: "Plan command handles failure"
    type: file_check
    path: ".claude/commands/plan.md"
    contains: "If something breaks"
    feature: commands
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: go-has-recovery
    belief: "Go command handles failure"
    type: file_check
    path: ".claude/commands/go.md"
    contains: "If something breaks"
    feature: commands
    quality: correctness
    layer: infrastructure
    severity: warn

  # ── commands / craft ──

  - id: commands-are-intuitive
    belief: "The slash commands make sense to a new user"
    type: llm_judge
    path: "commands"
    prompt: "Read these command files. Would a new user understand what /plan, /go, /eval, /feature, and /ship do from their descriptions? Are the names intuitive?"
    feature: commands
    quality: craft
    layer: ux
    severity: warn

  # ── commands / completeness ──

  - id: commands-complete
    belief: "Slash commands cover the full founder workflow"
    type: feature_review
    feature: commands
    quality: completeness
    layer: logic
    path: "commands"
    capabilities:
      - "/plan finds the bottleneck and proposes tasks"
      - "/go runs the autonomous build loop"
      - "/eval runs assertions and shows pass/fail"
      - "/feature lists and views features"
      - "/ship commits, pushes, deploys"
      - "/init bootstraps a new project"
      - "/research explores unknown territory"
    severity: warn

  # ════════════════════════════════════════════════════════
  # INSTALL — can someone install and get started?
  # ════════════════════════════════════════════════════════

  # ── install / correctness ──

  - id: install-exists
    belief: "install.sh exists and is executable"
    type: self_check
    metric: install-exists
    feature: install
    quality: correctness
    layer: infrastructure
    severity: block

  - id: hooks-resolve
    belief: "Session start hook is configured"
    type: command_check
    command: test -f hooks/session_start.sh
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: mind-identity-loaded
    belief: "identity.md is symlinked in ~/.claude/rules/"
    type: file_check
    path: "~/.claude/rules/identity.md"
    feature: install
    quality: correctness
    layer: infrastructure
    severity: block

  - id: mind-thinking-loaded
    belief: "thinking.md is symlinked in ~/.claude/rules/"
    type: file_check
    path: "~/.claude/rules/thinking.md"
    feature: install
    quality: correctness
    layer: infrastructure
    severity: block

  # ── install / completeness ──

  # (install completeness assertions can be added as infra grows)

  # ════════════════════════════════════════════════════════
  # DOCS — is the product understandable?
  # ════════════════════════════════════════════════════════

  # ── docs / correctness ──

  - id: readme-exists
    belief: "README.md exists with quick start instructions"
    type: self_check
    metric: readme-exists
    feature: docs
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: readme-has-commands
    belief: "README documents the slash commands"
    type: self_check
    metric: readme-has-commands
    feature: docs
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: readme-has-scoring
    belief: "README explains how scoring works"
    type: self_check
    metric: readme-has-scoring
    feature: docs
    quality: correctness
    layer: infrastructure
    severity: warn

  # ── docs / craft ──

  - id: readme-clear-to-stranger
    belief: "A stranger can understand what rhino-os does from the README"
    type: llm_judge
    path: "README.md"
    prompt: "Read this README. Would someone who has never heard of rhino-os understand what it does, why they'd want it, and how to start? Is the quick start actually quick?"
    feature: docs
    quality: craft
    layer: ux
    severity: warn

  - id: no-jargon
    belief: "No user needs a glossary to use rhino-os"
    type: content_check
    forbidden: ["utilize", "leverage", "synergy", "paradigm", "ecosystem", "holistic"]
    feature: docs
    quality: craft
    layer: ux
    severity: warn

  # ════════════════════════════════════════════════════════
  # FEATURE INTEGRATION — do features reference each other?
  # ════════════════════════════════════════════════════════

  - id: plan-references-go
    belief: "/plan output references /go — commands don't exist in isolation"
    type: file_check
    path: "commands/plan.md"
    contains: "/go"
    feature: commands
    quality: completeness
    layer: ux
    severity: warn

  - id: plan-references-eval
    belief: "/plan output references /eval — measurement is part of planning"
    type: file_check
    path: "commands/plan.md"
    contains: "/eval"
    feature: commands
    quality: completeness
    layer: ux
    severity: warn

  - id: feature-depends-on-valid
    belief: "Every depends_on in rhino.yml references a feature that exists in the same features section"
    type: command_check
    command: awk '/^#/{next} /^  [a-z]/{feat=$1;sub(/:$/,"",feat);features[feat]=1} /depends_on:/{gsub(/.*\[/,"");gsub(/\].*/,"");split($0,deps,",");for(i in deps){gsub(/[ \t"]/,"",deps[i]);if(deps[i]!=""&&!(deps[i] in features)){print "INVALID: "deps[i];err=1}}} END{exit err+0}' config/rhino.yml
    feature: scoring
    quality: correctness
    layer: logic
    severity: warn

  # ════════════════════════════════════════════════════════
  # COMMAND COMPOSITION — commands recommend next steps
  # ════════════════════════════════════════════════════════

  - id: commands-have-next-recommendations
    belief: "At least 10 command files contain next-command recommendations"
    type: command_check
    command: test $(grep -rl '/plan\|/go\|/eval\|/ship\|/roadmap' commands/*.md | wc -l) -ge 10
    feature: commands
    quality: completeness
    layer: ux
    severity: warn

  - id: commands-recommend-existing
    belief: "Commands only recommend slash commands that exist as files"
    type: command_check
    command: for cmd in plan go eval feature ship init research ideate rhino roadmap retro assert strategy todo clone skill product; do test -f "commands/${cmd}.md" || exit 1; done
    feature: commands
    quality: correctness
    layer: logic
    severity: warn

  # ════════════════════════════════════════════════════════
  # INSTALL-TO-VALUE — can someone install and get value?
  # ════════════════════════════════════════════════════════

  - id: install-is-executable
    belief: "install.sh exists and is executable"
    type: command_check
    command: test -x install.sh
    feature: install
    quality: correctness
    layer: infrastructure
    severity: block

  - id: install-creates-symlinks
    belief: "install.sh creates symlinks for mind files and commands"
    type: file_check
    path: "install.sh"
    contains: "ln -s"
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: rhino-cli-entrypoint-exists
    belief: "bin/rhino CLI entry point exists and is executable"
    type: command_check
    command: test -x bin/rhino
    feature: install
    quality: correctness
    layer: infrastructure
    severity: block

  # ════════════════════════════════════════════════════════
  # DEPENDENCY VALIDATION — feature graph is consistent
  # ════════════════════════════════════════════════════════

  # ════════════════════════════════════════════════════════
  # UPDATE PATH — can users update rhino-os?
  # ════════════════════════════════════════════════════════

  - id: rhino-has-update-handler
    belief: "bin/rhino contains an update subcommand handler"
    type: file_check
    path: "bin/rhino"
    contains: "update"
    feature: install
    quality: completeness
    layer: ux
    severity: warn

  # ════════════════════════════════════════════════════════
  # PLUGIN COMPATIBILITY — plugin distribution works
  # ════════════════════════════════════════════════════════

  - id: plugin-json-exists
    belief: ".claude-plugin/plugin.json exists"
    type: command_check
    command: test -f .claude-plugin/plugin.json
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: plugin-json-has-name
    belief: "plugin.json contains a name field"
    type: file_check
    path: ".claude-plugin/plugin.json"
    contains: name
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: plugin-json-has-version
    belief: "plugin.json contains a version field"
    type: file_check
    path: ".claude-plugin/plugin.json"
    contains: version
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: hooks-json-exists
    belief: "hooks/hooks.json exists for plugin hook registration"
    type: command_check
    command: test -f hooks/hooks.json
    feature: install
    quality: correctness
    layer: infrastructure
    severity: warn

  # ════════════════════════════════════════════════════════
  # LEARNING LOOP HEALTH — the loop closes properly
  # ════════════════════════════════════════════════════════

  - id: predictions-path-in-mind
    belief: "predictions.tsv path is referenced in mind files"
    type: command_check
    command: grep -rl 'predictions.tsv' mind/*.md | head -1 | grep -q .
    feature: learning
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: grade-sh-exists
    belief: "grade.sh exists for auto-grading predictions"
    type: command_check
    command: test -f bin/grade.sh
    feature: learning
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: knowledge-model-four-sections
    belief: "experiment-learnings.md has the four-section structure (Known/Uncertain/Unknown/Dead Ends)"
    type: command_check
    command: FILE=~/.claude/knowledge/experiment-learnings.md; grep -q 'Known' "$FILE" && grep -q 'Uncertain' "$FILE" && grep -q 'Unknown' "$FILE" && grep -q 'Dead End' "$FILE"
    feature: learning
    quality: correctness
    layer: logic
    severity: warn

  # ════════════════════════════════════════════════════════
  # CLI CONSISTENCY — bin/rhino handles all subcommands
  # ════════════════════════════════════════════════════════

  - id: rhino-cli-handles-score
    belief: "bin/rhino handles the score subcommand"
    type: file_check
    path: "bin/rhino"
    contains: "score"
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: rhino-cli-handles-eval
    belief: "bin/rhino handles the eval subcommand"
    type: file_check
    path: "bin/rhino"
    contains: "eval"
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: rhino-cli-handles-feature
    belief: "bin/rhino handles the feature subcommand"
    type: file_check
    path: "bin/rhino"
    contains: "feature"
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: rhino-cli-handles-todo
    belief: "bin/rhino handles the todo subcommand"
    type: file_check
    path: "bin/rhino"
    contains: "todo"
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: rhino-cli-handles-doctor
    belief: "bin/rhino handles a doctor/self subcommand for diagnostics"
    type: file_check
    path: "bin/rhino"
    contains: "self"
    feature: self-diagnostic
    quality: correctness
    layer: infrastructure
    severity: warn

  # ════════════════════════════════════════════════════════
  # IDEATION DISTINCTIVENESS — ideate/product/research differ
  # ════════════════════════════════════════════════════════

  - id: ideate-differentiates
    belief: "ideate.md explains when to use /ideate vs other commands"
    type: file_check
    path: "commands/ideate.md"
    contains: "When to use"
    feature: commands
    quality: craft
    layer: ux
    severity: warn

  - id: product-differentiates
    belief: "product.md explains when to use /product vs other commands"
    type: file_check
    path: "commands/product.md"
    contains: "When to use"
    feature: commands
    quality: craft
    layer: ux
    severity: warn

  - id: research-differentiates
    belief: "research.md explains when to use /research vs other commands"
    type: file_check
    path: "commands/research.md"
    contains: "When to use"
    feature: commands
    quality: craft
    layer: ux
    severity: warn

  # ════════════════════════════════════════════════════════
  # VERSION LIFECYCLE — roadmap has tier structure
  # ════════════════════════════════════════════════════════

  - id: roadmap-has-tiers
    belief: "roadmap.yml contains tier: fields for version classification"
    type: file_check
    path: ".claude/plans/roadmap.yml"
    contains: "tier:"
    feature: docs
    quality: correctness
    layer: logic
    severity: warn

  - id: roadmap-mentions-tier-types
    belief: "roadmap.md documents major/minor/patch version tiers"
    type: file_check
    path: "commands/roadmap.md"
    contains: "MAJOR"
    feature: docs
    quality: completeness
    layer: ux
    severity: warn

  # ════════════════════════════════════════════════════════
  # STRATEGIST — unified strategic brain
  # ════════════════════════════════════════════════════════

  - id: strategist-skill-exists
    belief: "strategist skill file exists with full mode routing"
    type: command_check
    command: test -f skills/strategist/SKILL.md && grep -q 'bet' skills/strategist/SKILL.md && grep -q 'market' skills/strategist/SKILL.md && grep -q 'position' skills/strategist/SKILL.md
    feature: strategist
    quality: correctness
    layer: infrastructure
    severity: block

  - id: strategist-base-market-model
    belief: "Base market model ships with the skill for instant first use"
    type: command_check
    command: test -f .claude/cache/market-context-base.json && python3 -c "import json; d=json.load(open('.claude/cache/market-context-base.json')); assert 'saturated' in d['landscape']; assert 'emerging' in d['landscape']"
    feature: strategist
    quality: correctness
    layer: infrastructure
    severity: warn

  - id: strategist-anti-sycophancy
    belief: "strategist skill enforces anti-sycophancy rules"
    type: file_check
    path: "skills/strategist/SKILL.md"
    contains: "minimum 2 below 5"
    feature: strategist
    quality: craft
    layer: logic
    severity: warn

  - id: strategist-logs-predictions
    belief: "strategist bet mode logs predictions to predictions.tsv"
    type: file_check
    path: "skills/strategist/SKILL.md"
    contains: "predictions.tsv"
    feature: strategist
    quality: correctness
    layer: logic
    severity: warn

  - id: strategist-reads-codebase
    belief: "strategist grounds analysis in code reality, not just market data"
    type: file_check
    path: "skills/strategist/SKILL.md"
    contains: "rhino.yml"
    feature: strategist
    quality: correctness
    layer: logic
    severity: warn

  - id: strategist-has-7-dimensions
    belief: "bet scorer evaluates ideas against 7 named dimensions"
