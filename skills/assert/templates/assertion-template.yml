# Assertion templates — copy the block that matches your type

# ── file_check ── Does the file exist?
# Use for: infrastructure, config, required scripts
# Signal: low (existence != correctness)
- id: feature-file-exists
  belief: "critical file exists at expected path"
  type: file_check
  path: "path/to/file"
  # contains: "optional string"  # upgrades to content_check behavior
  feature: feature-name
  quality: correctness
  layer: infrastructure
  severity: block

# ── content_check ── Does the file contain the right things?
# Use for: config has required fields, source has key patterns, forbidden patterns absent
# Signal: medium (structure != behavior)
- id: feature-has-expected-content
  belief: "file contains required pattern"
  type: content_check
  path: "path/to/file"
  contains: "expected string"
  # forbidden: "pattern that should not appear"  # alternative: check absence
  # glob: "**/*.tsx"  # for directory-level checks
  feature: feature-name
  quality: correctness
  layer: logic
  severity: warn

# ── command_check ── Does it actually work?
# Use for: scripts run, CLIs produce output, features work end-to-end
# Signal: high (tests real behavior)
- id: feature-runs-correctly
  belief: "command runs and produces expected output"
  type: command_check
  command: "bash path/to/script.sh 2>&1"
  expect_exit: 0
  # expect_output: "expected string in stdout"  # optional
  feature: feature-name
  quality: correctness
  layer: logic
  severity: warn

# ── self_check ── Rhino internal metric
# Use for: rhino subsystem verification
# Signal: high
- id: feature-metric-name
  belief: "rhino subsystem metric passes"
  type: self_check
  metric: metric-name
  feature: feature-name
  quality: correctness
  layer: infrastructure
  severity: block

# ── score_trend ── Is it improving over time?
# Use for: tracking improvement, detecting stagnation
# Signal: high (requires 5+ eval runs for meaningful data)
- id: feature-trend-direction
  belief: "score is moving in expected direction"
  type: score_trend
  direction: not_flat  # up | down | not_flat
  window: 5
  feature: feature-name
  quality: correctness
  layer: logic
  severity: warn

# ── llm_judge ── Does it seem right? (last resort)
# Use for: qualitative claims that can't be mechanically checked
# Signal: highest but noisiest — different results across runs
# Target: <20% of total assertions
- id: feature-qualitative-claim
  belief: "qualitative claim about the feature"
  type: llm_judge
  claim: "specific, evaluatable claim — not vague"
  evidence_files: ["file1.md", "file2.sh"]
  # path: "single-file.md"  # shorthand for evidence_files with one file
  # prompt: "detailed evaluation instructions"  # alternative to claim
  feature: feature-name
  quality: craft
  layer: ux
  severity: warn

# ── feature_review ── Holistic feature audit
# Use for: periodic deep audits, usually generated by /eval not hand-written
# Signal: high but expensive
- id: feature-delivers-value
  belief: "feature delivers on its value hypothesis"
  type: feature_review
  feature: feature-name
  quality: completeness
  layer: logic
  severity: warn
