# rhino.yml — Tunable parameters for rhino-os.
# Keep this minimal. Most behavior lives in mind/ and .claude/commands/.

# ── Project ─────────────────────────────────────────
project:
  # Maps to strategy.yml: mvp≈one, early≈some, growth≈many
  stage: early  # mvp → early → growth → mature. Controls score ceiling warnings.
  mode: build   # build → workshop mode (no shipping pressure, learning focus)
                # ship  → pipeline mode (/ship visible, ceiling warnings active)

# ── Value Definition ───────────────────────────────
# The founder defines what value means. Everything else serves this.
# /assert reads this to generate assertions. /plan reads this to prioritize.
# /go reads this to know when a task actually matters.
value:
  # One sentence: what does the user get?
  hypothesis: "A solo founder's product gets measurably better every session with less effort than doing it manually"
  # Who specifically?
  user: "Solo technical founders building products with Claude Code"
  # How do we know it's working? (measurable proxies)
  signals:
    - name: time_to_first_value
      description: "Score improves after first /go session"
      target: "Score delta > 0 within 1 session"
      measurable: true
    - name: loop_compounds
      description: "Prediction accuracy improves over 5+ sessions"
      target: "Accuracy trend is upward"
      measurable: true
    - name: assertions_graduate
      description: "Failing assertions become passing over time"
      target: ">50% of planted assertions pass within 3 sessions"
      measurable: true
    - name: return_trigger
      description: "Founder starts next session with /plan, not from scratch"
      target: "Active plan exists at session start"
      measurable: true
    - name: would_notice_removal
      description: "Founder would miss rhino-os if it disappeared"
      target: "Qualitative — ask"
      measurable: false

# ── Scoring (score.sh) — Value, not health ────────
scoring:
  cache_ttl: 300
  health_gate_threshold: 20    # health < this → score = 0
  health_warn_threshold: 40    # health < this → warning in output
  onboarding_cap: 50           # max score without assertions
  build:
    ts_error_penalty: -30
    stale_build_penalty: -10
    build_fail_penalty: -50
    gate_threshold: 70
  # Hygiene penalties are hardcoded tiers in score.sh
  # Product-specific structure weights in lens/product/config/rhino-product.yml

# ── Score Integrity ──────────────────────────────────
integrity:
  stage_ceilings:
    mvp: { score: [30, 65], taste: [20, 60] }
    early: { score: [45, 80], taste: [35, 70] }
    growth: { score: [60, 90], taste: [55, 80] }
    mature: { score: [70, 95], taste: [70, 90] }
  cosmetic_only_warning: true
  max_single_commit_delta: 15
  plateau_tasks: 3

# ── Build ──────────────────────────────────────────
build:
  revert_on_regression: true
  simplicity_bias: true

# ── Go (autonomous loop) ────────────────────────────
go:
  plateau_threshold: 3
  # taste_every_n moved to lens/product/config/rhino-product.yml

# ── Features ─────────────────────────────────────────
# Each feature declares what it delivers and for whom.
# `rhino eval .` reads these and has Claude judge the gap
# between claim and code. DELIVERS/PARTIAL/MISSING → score.
#
# Maturity levels (auto-computed from assertions + code, or set manually):
#   planned   — idea exists, no code yet
#   building  — code in progress, not working end-to-end
#   working   — delivers on its claim, assertions passing
#   polished  — edge cases handled, tests exist, UX solid
#
# Optional fields:
#   depends_on: [feature_name]  — what must work first
#   weight: 1-5                 — importance to value hypothesis (default: 1)
#   maturity: planned|building|working|polished
features:
  scoring:
    delivers: "honest number that tells a founder if their product improved"
    for: "solo founder who just made changes"
    code: ["bin/score.sh", "bin/eval.sh", "bin/lib/config.sh"]
    commands: ["rhino score .", "rhino eval ."]
    status: active
    weight: 5
    maturity: working
  learning:
    delivers: "a model that gets smarter every session — predictions, grading, knowledge updates, session trail"
    for: "the system itself — compounds over time"
    code: ["hooks/session_start.sh", "bin/self.sh", "bin/grade.sh", "bin/trail.sh", "~/.claude/knowledge/predictions.tsv"]
    commands: ["rhino trail"]
    status: active
    weight: 4
    maturity: working
    depends_on: [scoring]
  self-diagnostic:
    delivers: "system health check — measures calibration, staleness, learning loop integrity"
    for: "solo founder who wants to know if the system is working"
    code: ["bin/self.sh", "bin/bench.sh"]
    commands: ["rhino self", "rhino bench"]
    status: killed
    killed_reason: "navel-gazing. useful bits folded into /retro. nobody outside us uses it."
    killed_date: 2026-03-16
    weight: 2
    maturity: working
    depends_on: [scoring, learning]
  commands:
    delivers: "slash commands that route founder intent to the right action"
    for: "solo founder working in Claude Code"
    code: [".claude/commands/plan.md", ".claude/commands/go.md", ".claude/commands/eval.md", ".claude/commands/feature.md", ".claude/commands/init.md", ".claude/commands/ship.md", ".claude/commands/ideate.md", ".claude/commands/research.md", ".claude/commands/roadmap.md", ".claude/commands/rhino.md", ".claude/commands/clone.md", ".claude/commands/assert.md", ".claude/commands/retro.md", ".claude/commands/skill.md", ".claude/commands/strategy.md", ".claude/commands/todo.md", ".claude/commands/product.md"]
    commands: ["rhino help"]
    status: active
    weight: 5
    maturity: working
  install:
    delivers: "one-command setup — clone, run install.sh, everything works"
    for: "new user trying rhino-os for the first time"
    code: ["install.sh", "README.md"]
    commands: ["rhino init"]
    status: active
    weight: 3
    maturity: polished
  todo:
    delivers: "persistent backlog that survives across sessions — capture, tag, prioritize, promote"
    for: "solo founder managing ideas across sessions"
    code: ["bin/todo.sh", "commands/todo.md"]
    commands: ["rhino todo"]
    status: active
    weight: 2
    maturity: working
  docs:
    delivers: "clear explanation of what rhino-os is and how to use it"
    for: "someone who has never heard of rhino-os"
    code: ["README.md"]
    status: active
    weight: 3
    maturity: working

  strategist:
    delivers: "full-stack product strategist — market intelligence, bet scoring, positioning, pricing, GTM, competitive response, honest diagnosis. One unified skill replacing /product + /strategy + /research."
    for: "solo technical founder who needs a strategic advisor, not just a code tool"
    code: ["skills/strategist/SKILL.md", ".claude/cache/market-context.json", ".claude/cache/market-context-base.json"]
    commands: ["/strategist", "/strategist bet", "/strategist market", "/strategist position", "/strategist price", "/strategist gtm", "/strategist compete", "/strategist honest"]
    status: active
    weight: 5
    maturity: planned
    depends_on: [commands]

  # ── v9 Skills (planned 2026-03-16) ─────────────────
  yc:
    delivers: "pressure-tested YC applications, weekly updates with predictions, honest metrics tracking, demo day prep"
    for: "technical founders applying to or running YC companies"
    code: []
    commands: ["/yc apply", "/yc weekly", "/yc metrics", "/yc demo"]
    status: active
    weight: 4
    maturity: planned
  deep-research:
    delivers: "multi-agent research synthesis — parallel explorer + market-analyst + academic agents, confidence-rated findings, auto-logged to knowledge model"
    for: "any founder making build-vs-buy, architecture, or market decisions"
    code: []
    commands: ["/deep-research"]
    status: active
    weight: 3
    maturity: planned
    depends_on: [commands]
  agent-eval:
    delivers: "evaluation of your Claude Code setup — skill coverage, agent effectiveness, hook latency, context efficiency"
    for: "anyone with 5+ skills who wonders if they're actually helping"
    code: []
    commands: ["/agent-eval"]
    status: active
    weight: 3
    maturity: planned
    depends_on: [scoring]
  founder-os:
    delivers: "rhino-os loop generalized beyond code — fundraising, hiring, customers, weekly founder review"
    for: "solo technical founders who live in the terminal"
    code: []
    commands: ["/fundraise", "/hire", "/customers", "/weekly"]
    status: active
    weight: 5
    maturity: planned
    depends_on: [yc, commands, learning]

# ── Evals ────────────────────────────────────────────
evals:
  generative: true               # use features: section for generative eval (Claude judges)
  beliefs_fallback: true          # also run beliefs.yml if it exists (supplementary)
  tier1_on_every_build: true
  tier2_on_demand: true          # behavioral eval — requires dev server
  block_on_failure: true         # hard fail on "block" severity beliefs
  warn_threshold: 3              # N consecutive warns before escalating

# ── Self ─────────────────────────────────────────────
self:
  prediction_accuracy_floor: 0.30
  prediction_accuracy_ceiling: 0.90
  prediction_stale_days: 7
  knowledge_stale_days: 14
  self_stale_days: 7
  min_predictions_per_week: 3
  hook_timeout_ms: 200
