# beliefs.yml — Your product's soul, enforced mechanically
#
# Each belief is a hypothesis about what makes your product great.
# Beliefs are tested on every build. Failing a "block" severity stops the commit.
#
# Lifecycle:
#   Active hypothesis -> eval runs
#   Validated -> eval locked permanently
#   Killed -> eval removed
#
# Types: dom_check, playwright_task, corpus_compare, content_check, route_graph
# Severity: block (stops build) | warn (flags but continues)

beliefs: []

